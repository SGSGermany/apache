<IfModule mod_ssl.c>
    # Disable non-secure protocols and ciphers
    #
    # We use TLSRef's "Intermediate" recommendations by default
    # This must be updated manually from time to time, cryptography isn't static
    #
    # generated 2026-06-09, TLSRef Guideline v6.0, Apache 2.4.68, OpenSSL 3.5.6-r0, intermediate config
    # https://configurator.tlsref.org/#server=apache&version=2.4.68&config=intermediate&openssl=3.5.6-r0&guideline=6.0
    #

    SSLProtocol             -all +TLSv1.2 +TLSv1.3
    SSLOpenSSLConfCmd       Curves X25519MLKEM768:X25519:prime256v1:secp384r1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305
    SSLCipherSuite          TLSv1.3 TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    SSLHonorCipherOrder     off
    SSLSessionTickets       off
</IfModule>
